name: release-notes-vi

# ADR-066, Issue #446: auto-prepend Vietnamese release notes template when
# release-please publishes a GitHub Release. The template provides the correct
# format; the human (or Claude Code) fills in the content and reviews.
#
# Trigger: `release: published` fires after release-please creates the tag +
# GitHub Release. At that point the body is English-only CHANGELOG.
#
# No API key needed. No cost.
on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  prepend-vi-template:
    name: Prepend Vietnamese release notes template
    runs-on: ubuntu-latest
    # Skip if body already has Vietnamese (idempotent on re-run)
    if: ${{ !contains(github.event.release.body, 'Phiên bản') }}
    steps:
      - name: Prepend Vietnamese template to release body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
          RELEASE_BODY: ${{ github.event.release.body }}
        run: |
          version="${TAG#v}"
          today="$(date +%d/%m/%Y)"

          # Build new body: Vietnamese template + separator + original CHANGELOG
          cat > /tmp/release-body.md <<TEMPLATE_END
          # Phiên bản ${version} (${today})

          ## Tóm tắt cho người dùng
          (chưa soạn — vui lòng cập nhật bằng \`gh release edit ${TAG}\` hoặc sửa trực tiếp trên GitHub)

          ## Chi tiết cho chủ dự án
          (chưa soạn — vui lòng cập nhật)

          ---

          TEMPLATE_END

          # Remove leading whitespace from heredoc (caused by YAML indentation)
          sed -i 's/^          //' /tmp/release-body.md

          # Append original CHANGELOG body
          printf '%s' "$RELEASE_BODY" >> /tmp/release-body.md

          gh release edit "$TAG" --notes-file /tmp/release-body.md
          echo "✓ Vietnamese template prepended to release ${TAG}. Please fill in the content."
