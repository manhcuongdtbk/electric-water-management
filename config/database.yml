# PostgreSQL. Versions 9.5 and up are supported.
#
# Cấu hình kết nối database cho 3 môi trường (development, test, production).
# Tất cả đều kế thừa từ default. Biến môi trường cho phép chạy trên Mac (không
# cần username/password — peer auth) lẫn Docker (có username/password từ compose).
#
# Tham khảo: https://guides.rubyonrails.org/configuring.html#configuring-a-database

default: &default
  adapter: postgresql
  encoding: unicode
  host: <%= ENV.fetch("DATABASE_HOST") { "localhost" } %>
  port: <%= ENV.fetch("DATABASE_PORT") { 5432 } %>
  username: <%= ENV.fetch("DATABASE_USERNAME") { nil } %>
  password: <%= ENV["ELECTRIC_WATER_MANAGEMENT_DATABASE_PASSWORD"] %>
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: <%= ENV.fetch("DATABASE_NAME") { "electric_water_management_development" } %>

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  database: electric_water_management_test<%= ENV['TEST_ENV_NUMBER'] %>

# Có thể dùng DATABASE_URL thay cho từng biến riêng lẻ:
#   DATABASE_URL="postgres://myuser:mypass@localhost/somedatabase"
#
# Connection URLs for non-primary databases can also be configured using
# environment variables. The variable name is formed by concatenating the
# connection name with `_DATABASE_URL`. For example:
#   CACHE_DATABASE_URL="postgres://cacheuser:cachepass@localhost/cachedatabase"
production:
  primary: &primary_production
    <<: *default
    database: <%= ENV.fetch("DATABASE_NAME") { "electric_water_management_production" } %>
