default: &default
  adapter: postgresql
  encoding: unicode
  host: <%= ENV.fetch("DB_HOST") { "localhost" } %>
  port: <%= ENV.fetch("DB_PORT") { 5433 } %>
  username: <%= ENV.fetch("DB_USERNAME") { "postgres" } %>
  password: <%= ENV.fetch("DB_PASSWORD") { "postgres" } %>
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: electric_water_management_development

test:
  <<: *default
  database: electric_water_management_test

production:
  primary: &primary_production
    <<: *default
    database: electric_water_management_production
    username: <%= ENV["DB_USERNAME"] %>
    password: <%= ENV["DB_PASSWORD"] %>
  cache:
    <<: *primary_production
    database: electric_water_management_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: electric_water_management_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: electric_water_management_production_cable
    migrations_paths: db/cable_migrate
